<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hany Delivery</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#0b0b0b;
    color:white;
}

/* HEADER */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    background:#000;
}

.logo{
    color:gold;
    font-size:22px;
    font-weight:bold;
}

button{
    background:gold;
    border:none;
    padding:10px 15px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

/* HERO */
.hero{
    padding:20px;
    text-align:center;
}

.hero h1{
    color:gold;
    font-size:40px;
}

.hero p{
    color:#ccc;
}

/* CATEGORIES */
.categories{
    display:flex;
    overflow:auto;
    gap:10px;
    padding:10px;
}

.cat{
    min-width:100px;
    background:#111;
    padding:10px;
    border-radius:15px;
    text-align:center;
}

/* PRODUCTS */
.products{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    padding:10px;
}

.product{
    background:#111;
    padding:10px;
    border-radius:15px;
    text-align:center;
}

.product img{
    width:100%;
    border-radius:10px;
}

.price{
    color:gold;
    margin:5px 0;
}

/* WHATSAPP */
.whatsapp{
    position:fixed;
    bottom:15px;
    right:15px;
    background:#25D366;
    color:white;
    padding:15px;
    border-radius:50%;
    font-size:20px;
}
</style>

</head>

<body>

<header>
    <div class="logo">HANI DELIVERY</div>
    <button onclick="alert('Login soon')">تسجيل الدخول</button>
</header>

<div class="hero">
    <h1>HANI DELIVERY</h1>
    <p>أطيب المأكولات... توصل لباب دارك</p>
    <button onclick="orderWhatsApp()">اطلب الآن عبر واتساب</button>
</div>
