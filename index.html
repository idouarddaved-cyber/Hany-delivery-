<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hany Delivery</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI';
    background:#0a0a0a;
    color:white;
}

/* HEADER */
header{
    background:linear-gradient(90deg,#000,#d4af37);
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:22px;
    font-weight:bold;
}

header button{
    background:gold;
    border:none;
    padding:8px 12px;
    border-radius:5px;
    cursor:pointer;
}

/* SLIDER */
.slider{
    display:flex;
    overflow-x:auto;
    gap:10px;
    padding:15px;
}

.slider img{
    width:260px;
    height:160px;
    object-fit:cover;
    border-radius:12px;
}

/* PRODUCTS */
.products{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:15px;
    padding:15px;
}

.card{
    background:#111;
    border-radius:12px;
    overflow:hidden;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
}

.card img{
    width:100%;
    height:130px;
    object-fit:cover;
}

.card-content{
    padding:10px;
}

.price{
    color:#d4af37;
    margin:5px 0;
}

.card button{
    width:100%;
    background:#d4af37;
    border:none;
    padding:8px;
    border-radius:5px;
    cursor:pointer;
}

/* CART */
.cart{
    position:fixed;
    right:-320px;
    top:0;
    width:300px;
    height:100%;
    background:#111;
    padding:15px;
    transition:0.3s;
    overflow-y:auto;
}

.cart.active{
    right:0;
}

.cart-item{
    border-bottom:1px solid #d4af37;
    margin-bottom:10px;
    padding-bottom:5px;
}

.total{
    margin-top:10px;
    font-weight:bold;
}

/* FLOAT BUTTONS */
.float{
    position:fixed;
    bottom:20px;
    left:20px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.float a{
    background:#d4af37;
    padding:12px;
    border-radius:50%;
    text-decoration:none;
    color:black;
    font-weight:bold;
}

/* LOGO ICON */
.bike{
    font-size:20px;
}
</style>
</head>

<body>

<header>
<div class="logo"><span class="bike">🏍️</span> Hany Delivery</div>
<button onclick="toggleCart()">🛒</button>
</header>

<!-- SLIDER -->
<div class="slider">
<img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
<img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">
<img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd">
<img src="https://images.unsplash.com/photo-1586190848861-99aa4a171e90">
</div>

<!-- PRODUCTS -->
<div class="products" id="products"></div>

<!-- CART -->
<div class="cart" id="cart">
<h2>🛒 السلة</h2>
<div id="cartItems"></div>
<div class="total" id="total"></div>
<button onclick="sendWhatsApp()">📲 اطلب الآن</button>
</div>

<!-- FLOAT -->
<div class="float">
<a href="https://wa.me/212649427331">📱</a>
<a href="https://instagram.com/HANY_DELIVERY_59">📸</a>
</div>

<script>

let products = [
{name:"Burger", price:40, img:"https://images.unsplash.com/photo-1550547660-d9450f859349"},
{name:"Pizza", price:60, img:"https://images.unsplash.com/photo-1600891964599-f61ba0e24092"},
{name:"Sandwich", price:25, img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd"},
{name:"Tacos", price:35, img:"https://images.unsplash.com/photo-1601924638867-3ec9f5c2b0c5"},
{name:"Pasta", price:50, img:"https://images.unsplash.com/photo-1589308078059-be1415eab4c3"},
{name:"Fries", price:12, img:"https://images.unsplash.com/photo-1541592106381-b31e9677c0e5"},
{name:"Coca Cola", price:10, img:"https://images.unsplash.com/photo-1581636625402-29b2a704ef13"},
{name:"Orange Juice", price:15, img:"https://images.unsplash.com/photo-1553530666-ba11a7da3888"}
];

let cart = [];

function displayProducts(){
let container = document.getElementById("products");

products.forEach((p,i)=>{
container.innerHTML += `
<div class="card">
<img src="${p.img}">
<div class="card-content">
<h4>${p.name}</h4>
<div class="price">${p.price} DH</div>
<button onclick="addToCart(${i})">أضف للسلة</button>
</div>
</div>
`;
});
}

function addToCart(i){
cart.push(products[i]);
updateCart();
}

function updateCart(){
let items = document.getElementById("cartItems");
let total = 0;
items.innerHTML="";

cart.forEach(p=>{
total += p.price;
items.innerHTML += `<div class="cart-item">${p.name} - ${p.price} DH</div>`;
});

document.getElementById("total").innerText = "المجموع: " + total + " DH";
}

function toggleCart(){
document.getElementById("cart").classList.toggle("active");
}

function sendWhatsApp(){
let message = "طلب جديد:%0A";
cart.forEach(p=>{
message += p.name + " - " + p.price + "DH%0A";
});
window.open("https://wa.me/212649427331?text="+message);
}

displayProducts();

</script>

</body>
</html>
