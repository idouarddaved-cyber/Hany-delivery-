<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hany Delivery</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: Arial; }
</style>
</head>

<body class="bg-black text-white">

<!-- HEADER -->
<header class="bg-gradient-to-r from-black to-yellow-500 p-4 flex justify-between items-center sticky top-0 z-50">

<h1 class="text-xl font-bold">🏍️ Hany Delivery</h1>

<div class="flex gap-3">
<input id="search" onkeyup="search()" placeholder="بحث..." class="px-2 py-1 text-black rounded">
<button onclick="toggleCart()" class="bg-green-600 px-3 py-1 rounded">🛒 <span id="count">0</span></button>
</div>

</header>

<!-- PRODUCTS -->
<div id="products" class="grid grid-cols-2 md:grid-cols-4 gap-4 p-4"></div>

<!-- CART -->
<div id="cartBox" class="fixed right-0 top-0 w-72 h-full bg-white text-black p-4 hidden">
<h2 class="font-bold mb-2">السلة</h2>
<div id="cart"></div>
<p id="total" class="font-bold mt-2"></p>
<button onclick="order()" class="bg-green-600 text-white w-full py-2 mt-3 rounded">اطلب واتساب</button>
</div>

<script>

let items = [
{name:"Burger", price:40, img:"https://images.unsplash.com/photo-1550547660-d9450f859349"},
{name:"Pizza", price:60, img:"https://images.unsplash.com/photo-1600891964599-f61ba0e24092"},
{name:"Tacos", price:35, img:"https://images.unsplash.com/photo-1601924638867-3ec9f5c2b0c5"},
{name:"Sandwich", price:25, img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd"},
{name:"Fries", price:12, img:"https://images.unsplash.com/photo-1541592106381-b31e9677c0e5"},
{name:"Pasta", price:50, img:"https://images.unsplash.com/photo-1589308078059-be1415eab4c3"},
{name:"Coca Cola", price:10, img:"https://images.unsplash.com/photo-1581636625402-29b2a704ef13"},
{name:"Juice", price:15, img:"https://images.unsplash.com/photo-1553530666-ba11a7da3888"}
];

let cart = [];

function showProducts(){
let html="";
items.forEach((p,i)=>{
html+=`
<div class="bg-gray-900 p-2 rounded text-center">
<img src="${p.img}" class="h-32 w-full object-cover rounded">
<h3>${p.name}</h3>
<p class="text-yellow-400">${p.price} DH</p>
<button onclick="add(${i})" class="bg-yellow-500 w-full py-1 rounded mt-1">أضف</button>
</div>`;
});
document.getElementById("products").innerHTML=html;
}

function add(i){
cart.push(items[i]);
update();
}

function update(){
document.getElementById("count").innerText=cart.length;

let html="";
let total=0;

cart.forEach(p=>{
html+=p.name+" - "+p.price+"DH<br>";
total+=p.price;
});

document.getElementById("cart").innerHTML=html;
document.getElementById("total").innerText="المجموع: "+total+"DH";
}

function toggleCart(){
let c=document.getElementById("cartBox");
c.classList.toggle("hidden");
}

function order(){
let msg="طلب:%0A";
cart.forEach(p=> msg+=p.name+" "+p.price+"DH%0A");
window.open("https://wa.me/212649427331?text="+msg);
}

function search(){
let q=document.getElementById("search").value.toLowerCase();
document.querySelectorAll("#products div").forEach((card,i)=>{
card.style.display = items[i].name.toLowerCase().includes(q) ? "block":"none";
});
}

showProducts();

</script>

</body>
</html>
